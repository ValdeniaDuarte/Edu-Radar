name: Atualizar noticias do Edu Radar

on:
  schedule:
    # Roda a cada 6 horas (horario UTC). Ajuste a vontade.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}  # permite rodar manualmente pelo botao "Run workflow"

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Buscar e filtrar noticias
        run: python scripts/fetch_news.py

      - name: Commitar mudancas (se houver)
        run: |
          git config user.name "edu-radar-bot"
          git config user.email "actions@github.com"
          git add data/noticias.json data/ultimo_log.txt
          git diff --cached --quiet || git commit -m "Atualizacao automatica de noticias"
          git push
